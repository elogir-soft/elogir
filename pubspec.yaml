name: elogir_workspace
description: Elogir monorepo — apps and shared packages.
version: 0.0.0
publish_to: 'none'

environment:
  sdk: ^3.11.1

workspace:
  - packages/*
  - packages/*/example
  - apps/*

dev_dependencies:
  melos: ^7.0.0

melos:
  name: elogir

  scripts:
    analyze:
      description: Run static analysis on all packages.
      exec:
        concurrency: 5
      run: dart analyze --fatal-infos

    test:
      description: Run tests in all packages.
      exec:
        concurrency: 5
      run: flutter test
      packageFilters:
        dirExists: test

    format:
      description: Check formatting of all packages.
      exec:
        concurrency: 5
      run: dart format --set-exit-if-changed .

    clean:
      description: Clean all packages.
      exec:
        concurrency: 5
      run: flutter clean

  ide:
    intellij: true
