name: alarm
description: A simple Flutter alarm manager plugin for both iOS and Android.
version: 5.2.1
homepage: https://github.com/gdelataillade/alarm
resolution: workspace

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=2.5.0"

dependencies:
  collection:
  equatable:
  flutter:
    sdk: flutter
  flutter_fgbg:
  json_annotation:
  logging:
  plugin_platform_interface:
  rxdart:
  shared_preferences:

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis:

flutter:
  assets:
    - assets/long_blank.mp3
    - assets/not_blank.mp3

  plugin:
    platforms:
      android:
        package: com.gdelataillade.alarm.alarm
        pluginClass: AlarmPlugin
      ios:
        pluginClass: SwiftAlarmPlugin
